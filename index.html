<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartlink Manager Pro</title>
    <!-- Fonts: Playfair Display (Mewah) & Plus Jakarta Sans (Modern) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icon: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gold: #D4AF37;
            --primary-gold-light: #F2D06B;
            --bg-dark: #050505;
            --bg-panel: rgba(20, 20, 20, 0.7);
            --border-color: rgba(212, 175, 55, 0.2);
            --text-color: #E0E0E0;
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: var(--text-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            
            /* SECURITY: DISABLE TEXT SELECTION */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* SECURITY: INPUTS HARUS BISA DIPILIH */
        input, select, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* ANIMASI BACKGROUND AURORA */
        .bg-anim {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: #1a1a1a; top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: #0f0f0f; bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .box {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 0 20px rgba(212, 175, 55, 0.05); /* Inner Glow */
            position: relative;
            z-index: 10;
            
            /* Animasi Masuk */
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER LOGO */
        .header-icon {
            text-align: center;
            margin-bottom: 20px;
            font-size: 40px;
            color: var(--primary-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            animation: pulseIcon 3s infinite ease-in-out;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h2 { 
            margin: 0; 
            text-align: center; 
            color: var(--primary-gold); 
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        label { 
            display: block; 
            margin-top: 20px; 
            font-size: 12px; 
            color: #aaa; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 14px 14px 14px 45px; /* Padding kiri lebih besar untuk icon */
            margin-top: 0;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Styling Select Arrow */
        select {
            appearance: none;
            cursor: pointer;
        }
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '\f107';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
            pointer-events: none;
        }

        /* FOCUS EFFECTS */
        input:focus, select:focus {
            border-color: var(--primary-gold);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 35px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #b5952f 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }
        button:active { transform: translateY(0); }
        button:disabled { 
            background: #333; 
            color: #666; 
            cursor: not-allowed; 
            box-shadow: none; 
            transform: none;
        }

        /* SHIMMER EFFECT ON BUTTON */
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.3) 50%,
                rgba(255,255,255,0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        button:hover::after {
            left: 150%;
            transition: 0.7s ease-in-out;
        }

        .msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            display: none;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .ok { 
            background: rgba(76, 175, 80, 0.1); 
            color: #4CAF50; 
            border: 1px solid rgba(76, 175, 80, 0.3); 
        }
        .err { 
            background: rgba(244, 67, 54, 0.1); 
            color: #f44336; 
            border: 1px solid rgba(244, 67, 54, 0.3); 
        }

    </style>
</head>
<!-- SECURITY: DISABLE RIGHT CLICK, SELECT, DRAG -->
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <!-- Background Animation Elements -->
    <div class="bg-anim">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

<div class="box">
    <div class="header-icon">
        <i class="fas fa-gem"></i>
    </div>
    <h2>Smartlink Manager</h2>
    
    <label>Pilih Repository</label>
    <div class="input-group select-wrapper">
        <i class="fas fa-code-branch input-icon"></i>
        <select id="repoName">
            <option value="KAHF">patrick1</option>
            <option value="newkahf">patrick2</option>
            <option value="landing-kahf-1766161652367">patrick3</option>
        </select>
    </div>

    <label>Smartlink Baru</label>
    <div class="input-group">
        <i class="fas fa-link input-icon"></i>
        <input type="text" id="newLink" placeholder="Paste smartlink">
    </div>

    <label>GitHub Token</label>
    <div class="input-group">
        <i class="fas fa-key input-icon"></i>
        <input type="password" id="token" placeholder="Paste Access Token">
    </div>

    <button id="btn" onclick="updateLink()">
        <i class="fas fa-rocket" style="margin-right: 8px;"></i> UPDATE SYSTEM
    </button>
    <div id="msg" class="msg"></div>
</div>

<script>
    const USERNAME = "kramat11";
    const FILENAME = "index.html";
    
    // BASE URL TRACKER (HARDCODED DI SCRIPT)
    const BASE_TRACKER = "https://imopol.dasboardkramat.workers.dev/track?cid=";

    // Load token tersimpan
    window.onload = () => {
        const savedToken = localStorage.getItem('kahf_token');
        if(savedToken) document.getElementById('token').value = savedToken;
    };

    async function updateLink() {
        const repo = document.getElementById('repoName').value;
        const link = document.getElementById('newLink').value.trim();
        const token = document.getElementById('token').value.trim();
        
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');

        if(!link || !token) {
            showMsg("⚠️ Mohon lengkapi semua kolom!", "err");
            return;
        }

        // LOGIKA OTOMATIS: EKSTRAK ID DARI SMARTLINK
        const sub1Match = link.match(/[?&]sub1=([^&#]*)/);
        const extractedID = sub1Match ? sub1Match[1] : null;

        if (!extractedID) {
            showMsg("⚠️ Error: Pastikan Smartlink memiliki parameter '?sub1=ID'", "err");
            return;
        }

        // GABUNGKAN BASE TRACKER DENGAN ID
        const finalTracker = BASE_TRACKER + extractedID;

        localStorage.setItem('kahf_token', token);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> PROCESSING...';
        showMsg("Sedang Sinkronisasi Data...", "ok");

        try {
            const url = `https://api.github.com/repos/${USERNAME}/${repo}/contents/${FILENAME}`;
            
            // 1. Ambil File
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });

            if(!res.ok) throw new Error("Gagal menghubungi GitHub. Cek Token/Repo.");
            
            const data = await res.json();
            let content = atob(data.content);

            // 2. Ganti Link Smartlink
            const smartlinkRegex = /const SMARTLINK = ".*?";/;
            if(!smartlinkRegex.test(content)) throw new Error("Pattern 'const SMARTLINK' tidak ditemukan.");
            content = content.replace(smartlinkRegex, `const SMARTLINK = "${link}";`);

            // 3. Ganti Link Tracking Pixel (OTOMATIS BERDASARKAN ID)
            const trackerRegex = /const TRACKING_PIXEL = ".*?";/;
            if(!trackerRegex.test(content)) throw new Error("Pattern 'const TRACKING_PIXEL' tidak ditemukan.");
            content = content.replace(trackerRegex, `const TRACKING_PIXEL = "${finalTracker}";`);

            const encodedContent = btoa(content);

            // 4. Push Update
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Update Smartlink & Sync Tracking ID",
                    content: encodedContent,
                    sha: data.sha
                })
            });

            if(!putRes.ok) throw new Error("Gagal Update. Pastikan Token memiliki akses 'repo'.");

            showMsg("✅ Sukses! Smartlink & Tracking ID telah disinkronisasi.", "ok");

        } catch (e) {
            showMsg("❌ System Error: " + e.message, "err");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rocket" style="margin-right: 8px;"></i> UPDATE SYSTEM';
        }
    }

    function showMsg(txt, type) {
        const el = document.getElementById('msg');
        el.style.display = 'block';
        el.className = 'msg ' + type;
        el.innerText = txt;
    }

    /* 
       =======================================================
       SECURITY SYSTEM: ANTI-DEBUG & ANTI-INSPECT
       =======================================================
    */

    // Mencegah Shortcuts
    document.addEventListener('keydown', function(e) {
        const isTyping = (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT');
        if (isTyping) return;

        if(e.keyCode == 123) { 
            alert("⛔ ACCESS DENIED: Inspect Element Disabled."); return false; 
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { 
            alert("⛔ ACCESS DENIED: Developer Tools Disabled."); return false; 
        }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { 
            alert("⛔ ACCESS DENIED: Source Code Protected."); return false; 
        }
        if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) { 
            e.preventDefault(); alert("⛔ ACCESS DENIED: Save Disabled."); return false; 
        }
        if(e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) { 
            alert("⛔ ACCESS DENIED: Copy Disabled."); return false; 
        }
    });

    // Loop Debugger
    setInterval(function() {
        const startTime = performance.now();
        debugger; 
        const endTime = performance.now();
        if (endTime - startTime > 100) {
            // window.location.reload();
        }
    }, 1000);

</script>

</body>
</html>
